    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-dark, #0f0a1a);
      color: var(--text-secondary, #c4b5d0);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    img { max-width: 100%; display: block; }
    a { color: var(--accent, #d946ef); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accent-light, #e879f9); }
    ul { list-style: none; }

    /* ── UTILITY ── */
    .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
    .section-label {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--accent); text-align: center;
      margin-bottom: 8px;
    }
    .section-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800;
      color: var(--text-primary, #faf5ff); text-align: center;
      margin-bottom: 12px; letter-spacing: -0.02em;
    }
    .section-subtitle {
      text-align: center; color: var(--text-secondary);
      max-width: 560px; margin: 0 auto 40px; font-size: 0.95rem;
    }
    .accent { color: var(--accent); }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 50px; font-weight: 600;
      font-size: 0.95rem; border: none; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      color: #fff; box-shadow: 0 4px 24px var(--accent-shadow);
    }
    .btn-outline {
      background: transparent; color: var(--accent);
      border: 2px solid var(--accent-border); padding: 12px 26px;
    }
    .btn-outline:hover { background: var(--accent-bg); }
    .btn-wa {
      background: #25D366; color: #fff;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
    }
    .btn-wa:hover { box-shadow: 0 6px 30px rgba(37, 211, 102, 0.5); }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 999;
      background: rgba(15, 10, 26, 0.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; max-width: 1140px; margin: 0 auto; padding-left: 24px; padding-right: 24px;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.1rem; color: var(--text-primary); }
    .nav-logo-icon { font-size: 1.4rem; }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a { font-size: 0.88rem; font-weight: 500; color: var(--text-secondary); }
    .nav-links a:hover { color: var(--accent); }
    .nav-cta { padding: 8px 20px; font-size: 0.82rem; border-radius: 50px; }
    .nav-toggle { display: none; background: none; border: none; color: var(--text-primary); font-size: 1.5rem; cursor: pointer; }

    /* ── HERO ── */
    .hero {
      position: relative; padding: 100px 0 60px;
      overflow: hidden; text-align: center;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, var(--accent-bg) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-bg); border: 1px solid var(--accent-border);
      padding: 6px 16px; border-radius: 50px; font-size: 0.78rem;
      font-weight: 600; color: var(--accent-light); margin-bottom: 20px;
    }
    .hero-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .hero h1 {
      font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 900;
      color: var(--text-primary); line-height: 1.1;
      margin-bottom: 16px; letter-spacing: -0.03em;
    }
    .hero h1 .gradient-text {
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 1.05rem; color: var(--text-secondary);
      max-width: 540px; margin: 0 auto 32px; line-height: 1.7;
    }
    .hero-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .hero-img {
      margin: 48px auto 0; max-width: 800px; border-radius: 16px;
      overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      border: 1px solid var(--border);
    }
    .hero-img img { width: 100%; height: 340px; object-fit: cover; }

    /* ── CATEGORIES ── */
    .categories { padding: 80px 0; }
    .cat-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(min(150px, 100%), 1fr));
      gap: 16px;
    }
    .cat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px 16px; text-align: center;
      transition: all 0.3s; cursor: pointer; position: relative; overflow: hidden;
    }
    .cat-card:hover {
      border-color: var(--accent-border-hover);
      transform: translateY(-4px);
      box-shadow: 0 8px 32px var(--accent-shadow-soft);
    }
    .cat-emoji { font-size: 2.4rem; margin-bottom: 12px; display: block; }
    .cat-name { font-size: 0.88rem; font-weight: 700; color: var(--text-primary); }
    .cat-count { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

    /* ── PRODUCTS ── */
    .products { padding: 80px 0; }
    .product-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(min(260px, 100%), 1fr));
      gap: 20px;
    }
    .product-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; transition: all 0.3s;
    }
    .product-card:hover {
      border-color: var(--accent-border-hover);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px var(--accent-shadow-soft);
    }
    .product-img {
      width: 100%; height: 200px; object-fit: cover;
      transition: transform 0.4s;
    }
    .product-card:hover .product-img { transform: scale(1.05); }
    .product-img-wrap { overflow: hidden; position: relative; }
    .product-badge {
      position: absolute; top: 12px; left: 12px;
      background: var(--accent); color: #fff; font-size: 0.68rem;
      font-weight: 700; padding: 4px 10px; border-radius: 50px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .product-body { padding: 20px; }
    .product-cat { font-size: 0.72rem; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .product-name { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
    .product-desc { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 14px; line-height: 1.6; }
    .product-footer { display: flex; align-items: center; justify-content: space-between; }
    .product-price { font-size: 1.1rem; font-weight: 800; color: var(--accent-light); }
    .product-cta {
      background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border);
      padding: 6px 14px; border-radius: 50px; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
    }
    .product-cta:hover { background: var(--accent); color: #fff; }

    /* ── FEATURES ── */
    .features { padding: 80px 0; }
    .feat-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(min(240px, 100%), 1fr));
      gap: 20px;
    }
    .feat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; text-align: center;
      transition: all 0.3s;
    }
    .feat-card:hover { border-color: var(--accent-border-hover); }
    .feat-icon { font-size: 2rem; margin-bottom: 14px; display: block; }
    .feat-title { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
    .feat-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }

    /* ── PROMO BANNER ── */
    .promo {
      padding: 80px 0;
    }
    .promo-box {
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      border-radius: 20px; padding: 48px 40px; text-align: center;
      position: relative; overflow: hidden;
    }
    .promo-box::before {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");

    }
    .promo-box h2 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 800; color: #fff; margin-bottom: 12px; position: relative; }
    .promo-box p { color: rgba(255,255,255,0.85); max-width: 480px; margin: 0 auto 24px; font-size: 0.95rem; position: relative; }
    .promo-box .btn { position: relative; }

    /* ── REVIEWS ── */
    .reviews { padding: 80px 0; }
    .review-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr));
      gap: 20px;
    }
    .review-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px;
    }
    .review-stars { color: #FBBF24; font-size: 0.9rem; margin-bottom: 14px; }
    .review-text { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.7; font-style: italic; }
    .review-author { display: flex; align-items: center; gap: 12px; }
    .review-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 0.85rem;
    }
    .review-name { font-size: 0.88rem; font-weight: 600; color: var(--text-primary); }
    .review-role { font-size: 0.75rem; color: var(--text-muted); }

    /* ── LOCATION & HOURS ── */
    .location { padding: 80px 0; }
    .loc-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(min(300px, 100%), 1fr));
      gap: 24px;
    }
    .loc-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px;
    }
    .loc-card h3 { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; }
    .loc-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    .loc-row:last-child { border-bottom: none; }
    .loc-day { color: var(--text-secondary); }
    .loc-hour { color: var(--text-primary); font-weight: 600; }
    .loc-closed { color: var(--text-muted); }
    .loc-info { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; font-size: 0.9rem; }
    .loc-icon { font-size: 1.2rem; flex-shrink: 0; }
    .loc-map {
      width: 100%; height: 240px; border-radius: 12px;
      border: 1px solid var(--border); margin-top: 16px;

    /* ── CONTACT CTA ── */

    .cta-box {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px; text-align: center;

    .cta-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    /* ── FOOTER ── */
    .footer {
      border-top: 1px solid var(--border); padding: 40px 0 24px;
    }
    .footer-inner {
      display: flex; justify-content: space-between; align-items: center;

    }
    .footer-copy { font-size: 0.8rem; color: var(--text-muted); }
    .footer-social { display: flex; gap: 16px; }
    .footer-social a {
      color: var(--text-muted); font-size: 0.85rem; font-weight: 500;
      transition: color 0.2s;
    }
    .footer-social a:hover { color: var(--accent); }
    .footer-dev { font-size: 0.72rem; color: var(--text-muted); text-align: center; width: 100%; margin-top: 16px; }
    .footer-dev a { color: var(--accent); }

    /* ── WHATSAPP FLOAT ── */
    .wa-float {
      position: fixed; bottom: 24px; right: 24px; z-index: 900;
      width: 56px; height: 56px; border-radius: 50%;
      background: #25D366; color: #fff; font-size: 1.6rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);

    }

    /* ── DEMO BANNER ── */

      text-align: center; padding: 10px 16px; font-size: 0.78rem;

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-toggle { display: block; }

        display: flex; flex-direction: column; position: absolute;
        top: 100%; left: 0; right: 0;
        background: var(--bg-dark); border-bottom: 1px solid var(--border);
        padding: 16px 24px; gap: 16px;
      }
      .hero { padding: 80px 0 48px; }
      .hero-buttons { flex-direction: column; align-items: center; }
      .hero-img img { height: 220px; }
      section { padding: 60px 0; }
      .promo-box { padding: 36px 24px; }
      .cta-box { padding: 36px 24px; }
    }
    @media (max-width: 480px) {
      .container { padding: 0 16px; }
      section { padding: 48px 0; }
      .hero { padding: 70px 0 36px; }
      .hero h1 { font-size: 1.75rem; }
      .hero-sub { font-size: 0.92rem; }

      .cat-card { padding: 16px 10px; }

      .footer-inner { flex-direction: column; text-align: center; }
      .wa-float { width: 50px; height: 50px; font-size: 1.4rem; bottom: 16px; right: 16px; }
    }
  </style>
</head>
