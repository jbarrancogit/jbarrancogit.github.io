<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-dark, #0B1120);
      color: #CBD5E1;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    img { max-width: 100%; display: block; }
    a { color: var(--accent-light, #38BDF8); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accent-lighter, #7DD3FC); }
    ul { list-style: none; }

    /* ===== UTILITY ===== */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 1.25rem; }
    .section-title {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      color: #F1F5F9;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .section-subtitle {
      text-align: center;
      color: #94A3B8;
      max-width: 600px;
      margin: 0 auto 2.5rem;
      font-size: 1rem;
    }
    .accent { color: var(--accent, #0EA5E9); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1.8rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent, #0EA5E9), var(--accent-secondary, #06B6D4));
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-shadow, rgba(14, 165, 233, 0.35));
    }
    .btn-primary:hover { background: linear-gradient(135deg, var(--accent-light, #38BDF8), var(--accent-secondary-light, #22D3EE)); color: #fff; }
    .btn-whatsapp {
      background: #25D366;
      color: #fff;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
    }
    .btn-whatsapp:hover { background: #2BE675; color: #fff; }

    /* ===== NAV ===== */
    .navbar {
      background: rgba(11, 17, 32, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--accent-border, rgba(14, 165, 233, 0.1));
      padding: 0.9rem 0;
      position: sticky;
      top: 0;
      z-index: 999;
    }
    .navbar .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand {
      font-size: 1.15rem;
      font-weight: 700;
      color: #F1F5F9;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .nav-brand span { color: var(--accent, #0EA5E9); }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a {
      color: #94A3B8;
      font-size: 0.88rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent, #0EA5E9); }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
    }
    .nav-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: #CBD5E1;
      margin: 5px 0;
      border-radius: 2px;
      transition: 0.3s;
    }

    /* ===== HERO ===== */
    .hero {
      padding: 5rem 0 4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(11, 17, 32, 0.88) 0%, rgba(11, 17, 32, 0.92) 50%, rgba(11, 17, 32, 0.97) 100%);
      pointer-events: none;
    }
    .hero .container {
      position: relative;
      z-index: 1;
    }
    .hero-emoji {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      display: block;
    }
    .hero h1 {
      font-size: clamp(2rem, 5.5vw, 3.2rem);
      font-weight: 800;
      color: #F1F5F9;
      line-height: 1.15;
      margin-bottom: 1rem;
    }
    .hero h1 .highlight {
      background: linear-gradient(135deg, var(--accent, #0EA5E9), var(--accent-secondary, #06B6D4));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 1.1rem;
      color: #94A3B8;
      max-width: 560px;
      margin: 0 auto 2rem;
    }
    .hero-buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .hero-trust {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2rem;
    }
    .hero-trust-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: #64748B;
      font-weight: 500;
    }
    .hero-trust-item .icon { color: var(--accent, #0EA5E9); font-size: 1rem; }

    /* ===== ABOUT ===== */
    .about {
      padding: 4.5rem 0;
      background: linear-gradient(180deg, #0B1120, #0F172A);
    }
    .about-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 2.5rem;
      align-items: center;
    }
    .about-photo {
      width: 280px;
      height: 340px;
      border-radius: 1rem;
      background: var(--photo-gradient, linear-gradient(135deg, #0c4a6e 0%, #0e7490 50%, #06b6d4 100%));
      background-size: cover;
      background-position: center top;
      border: 2px solid var(--accent-border, rgba(14, 165, 233, 0.2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      position: relative;
      overflow: hidden;
    }
    .about-photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(11, 17, 32, 0.4) 100%);
      border-radius: 1rem;
    }
    .about-text h2 {
      font-size: 1.8rem;
      color: #F1F5F9;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .about-text .credential {
      color: var(--accent, #0EA5E9);
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      display: block;
    }
    .about-text p { margin-bottom: 1rem; color: #94A3B8; }
    .about-badges {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }
    .about-badges .badge {
      background: var(--accent-bg, rgba(14, 165, 233, 0.1));
      border: 1px solid var(--accent-border, rgba(14, 165, 233, 0.2));
      padding: 0.45rem 1rem;
      border-radius: 9999px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--accent-light, #38BDF8);
    }

    /* ===== SERVICES ===== */
    .services { padding: 4.5rem 0; }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.25rem;
    }
    .service-card {
      background: #111827;
      border: 1px solid #1E293B;
      border-radius: 1rem;
      padding: 0;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
    }
    .service-card:hover {
      border-color: var(--accent, #0EA5E9);
      transform: translateY(-4px);
      box-shadow: 0 8px 32px var(--accent-shadow-soft, rgba(14, 165, 233, 0.08));
    }
    .service-card-img {
      width: 100%;
      height: 180px;
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .service-card-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(17, 24, 39, 0.7) 100%);
    }
    .service-card-body {
      padding: 1.25rem 1.75rem 1.75rem;
    }
    .service-icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .service-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #F1F5F9;
      margin-bottom: 0.4rem;
    }
    .service-card p {
      font-size: 0.9rem;
      color: #94A3B8;
      margin-bottom: 0.75rem;
      line-height: 1.6;
    }
    .service-price {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--accent, #0EA5E9);
    }

    /* ===== APPOINTMENT ===== */
    .appointment {
      padding: 4.5rem 0;
      background: #0F172A;
    }
    .appointment-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      align-items: start;
    }
    .appointment-info h3 {
      font-size: 1.3rem;
      color: #F1F5F9;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .appointment-info p {
      color: #94A3B8;
      margin-bottom: 1.25rem;
      font-size: 0.95rem;
    }
    .appointment-steps { margin-bottom: 1.5rem; }
    .appointment-steps li {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .step-num {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-bg, rgba(14, 165, 233, 0.15));
      color: var(--accent, #0EA5E9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
    }
    .step-text { font-size: 0.92rem; color: #CBD5E1; padding-top: 0.2rem; }
    .form-card {
      background: #111827;
      border: 1px solid #1E293B;
      border-radius: 1rem;
      padding: 2rem;
    }
    .form-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #F1F5F9;
      margin-bottom: 1.25rem;
      text-align: center;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #94A3B8;
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.7rem 1rem;
      background: #0B1120;
      border: 1px solid #1E293B;
      border-radius: 0.5rem;
      color: #F1F5F9;
      font-family: inherit;
      font-size: 0.92rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent, #0EA5E9);
      box-shadow: 0 0 0 3px var(--accent-shadow-soft, rgba(14, 165, 233, 0.1));
    }
    .form-group input::placeholder { color: #475569; }
    .form-group select option { background: #111827; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .form-card .btn { width: 100%; justify-content: center; margin-top: 0.5rem; }

    /* ===== INSURANCE ===== */
    .insurance { padding: 4.5rem 0; }
    .insurance-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      max-width: 800px;
      margin: 0 auto;
    }
    .insurance-item {
      background: #111827;
      border: 1px solid #1E293B;
      border-radius: 0.75rem;
      padding: 0.9rem 1.5rem;
      font-weight: 600;
      font-size: 0.92rem;
      color: #F1F5F9;
      transition: border-color 0.3s, transform 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .insurance-item:hover { border-color: var(--accent, #0EA5E9); transform: translateY(-2px); }
    .insurance-item .check { color: var(--accent, #0EA5E9); }
    .insurance-note {
      text-align: center;
      color: #64748B;
      font-size: 0.85rem;
      margin-top: 1.5rem;
    }

    /* ===== LOCATION ===== */
    .location {
      padding: 4.5rem 0;
      background: #0F172A;
    }
    .location-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
    }
    .location-map {
      border-radius: 1rem;
      overflow: hidden;
      background: #1E293B;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .location-map iframe {
      width: 100%;
      height: 100%;
      min-height: 340px;
      border: 0;
      filter: brightness(0.85) contrast(1.1) saturate(0.8);
    }
    .location-details h3 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #F1F5F9;
      margin-bottom: 1.25rem;
    }
    .location-item {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      align-items: flex-start;
    }
    .location-icon {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 0.6rem;
      background: var(--accent-bg, rgba(14, 165, 233, 0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
    }
    .location-item strong {
      display: block;
      color: #F1F5F9;
      font-size: 0.9rem;
      margin-bottom: 0.15rem;
    }
    .location-item span {
      font-size: 0.88rem;
      color: #94A3B8;
      line-height: 1.5;
    }

    /* ===== TESTIMONIALS ===== */
    .testimonials { padding: 4.5rem 0; }
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    .testimonial-card {
      background: #111827;
      border: 1px solid #1E293B;
      border-radius: 1rem;
      padding: 1.75rem;
      transition: border-color 0.3s;
    }
    .testimonial-card:hover { border-color: var(--accent-border-hover, rgba(14, 165, 233, 0.3)); }
    .testimonial-stars {
      color: #FBBF24;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
      letter-spacing: 2px;
    }
    .testimonial-card blockquote {
      font-size: 0.92rem;
      color: #CBD5E1;
      font-style: italic;
      margin-bottom: 1rem;
      line-height: 1.65;
    }
    .testimonial-author {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .testimonial-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent, #0EA5E9), #8B5CF6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      font-weight: 700;
      color: #fff;
    }
    .testimonial-name {
      font-weight: 600;
      color: #F1F5F9;
      font-size: 0.88rem;
    }
    .testimonial-role {
      font-size: 0.78rem;
      color: #64748B;
    }

    /* ===== FOOTER ===== */
    .footer {
      background: #070D1A;
      border-top: 1px solid #1E293B;
      padding: 3rem 0 1.5rem;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }
    .footer-brand h3 {
      font-size: 1.15rem;
      color: #F1F5F9;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .footer-brand p {
      color: #64748B;
      font-size: 0.88rem;
      max-width: 320px;
    }
    .footer h4 {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94A3B8;
      margin-bottom: 0.75rem;
    }
    .footer ul li {
      margin-bottom: 0.4rem;
    }
    .footer ul li a {
      font-size: 0.88rem;
      color: #64748B;
      transition: color 0.2s;
    }
    .footer ul li a:hover { color: var(--accent, #0EA5E9); }
    .footer-bottom {
      border-top: 1px solid #1E293B;
      padding-top: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: #475569;
    }
    .footer-bottom a { color: var(--accent, #0EA5E9); }

    /* ===== SCROLL ANIMATIONS ===== */
    .fade-up {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-toggle { display: block; }
      .nav-links.active {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(11, 17, 32, 0.98);
        backdrop-filter: blur(12px);
        padding: 1rem 1.5rem;
        border-bottom: 1px solid #1E293B;
        gap: 0.75rem;
      }
      .about-grid {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .about-photo {
        margin: 0 auto;
        width: 200px;
        height: 240px;
      }
      .service-card-img {
        height: 150px;
      }
      .about-badges { justify-content: center; }
      .appointment-grid { grid-template-columns: 1fr; }
      .location-grid { grid-template-columns: 1fr; }
      .footer-grid { grid-template-columns: 1fr; gap: 1.5rem; }
      .hero { padding: 3.5rem 0 3rem; }
      .hero-emoji { font-size: 2.8rem; }
      .form-row { grid-template-columns: 1fr; }
      .services-grid { grid-template-columns: 1fr; }
      .testimonials-grid { grid-template-columns: 1fr; }
      .hero-trust { gap: 0.75rem; }
    }
    @media (max-width: 480px) {
      .hero h1 { font-size: 1.8rem; }
    }
  </style>
</head>

    // =====================================================================
    // INTERACTIONS — Mobile nav, scroll animations, form handling
    // =====================================================================
    function initInteractions() {
      // Mobile nav toggle
      const navToggle = document.getElementById('navToggle');
      const navLinks = document.getElementById('navLinks');
      if (navToggle && navLinks) {
        navToggle.addEventListener('click', () => {
          navLinks.classList.toggle('active');
        });
        navLinks.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', () => navLinks.classList.remove('active'));
        });
      }

      // Scroll animations
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

      // Set minimum date on date input to today
      const fechaInput = document.getElementById('fecha');
      if (fechaInput) {
        const today = new Date().toISOString().split('T')[0];
        fechaInput.setAttribute('min', today);
      }

      // Form handling
      const form = document.getElementById('turnoForm');
      const formSuccess = document.getElementById('formSuccess');
      if (form && formSuccess) {
        if (!CONFIG.formspreeId) {
          // No Formspree — handle locally as demo
          form.addEventListener('submit', (e) => {
            e.preventDefault();
            formSuccess.style.display = 'block';
            form.style.display = 'none';
          });
        } else {
          // Formspree — handle AJAX submission
          form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = new FormData(form);
            try {
              const resp = await fetch(form.action, {
                method: 'POST',
                body: data,
                headers: { 'Accept': 'application/json' }
              });
              if (resp.ok) {
                formSuccess.style.display = 'block';
                form.style.display = 'none';
              } else {
                alert('Hubo un error al enviar el formulario. Por favor, intentá de nuevo o contactanos por WhatsApp.');
              }
            } catch (err) {
              alert('Error de conexión. Por favor, intentá de nuevo o contactanos por WhatsApp.');
            }
          });
        }
      }
    }
  </script>

</body>
</html>
