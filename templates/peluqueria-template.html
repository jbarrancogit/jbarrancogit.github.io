<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D4A017;
            --gold-light: #E8BF3B;
            --gold-dark: #B8860B;
            --bg-primary: #0A0A0A;
            --bg-secondary: #111111;
            --bg-card: #1A1A1A;
            --bg-card-hover: #222222;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --text-muted: #777777;
            --border: #2A2A2A;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --shadow-gold: 0 4px 30px rgba(212,160,23,0.15);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        section {
            padding: 80px 0;
        }

        .section-label {
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--gold);
            margin-bottom: 12px;
        }

        .section-title {
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 16px;
        }

        .section-subtitle {
            font-size: 1.05rem;
            color: var(--text-secondary);
            max-width: 550px;
            line-height: 1.7;
        }

        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-header .section-subtitle {
            margin: 0 auto;
        }

        /* ===== DEMO BANNER ===== */
        .demo-banner {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            color: #0A0A0A;
            text-align: center;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .demo-banner a {
            color: #0A0A0A;
            text-decoration: underline;
            text-underline-offset: 2px;
            font-weight: 700;
        }

        .demo-banner a:hover {
            opacity: 0.8;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: sticky;
            top: 38px;
            z-index: 999;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
        }

        .navbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
        }

        .navbar-logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .navbar-logo span {
            color: var(--gold);
        }

        .navbar-links {
            display: flex;
            gap: 28px;
            list-style: none;
        }

        .navbar-links a {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .navbar-links a:hover {
            color: var(--gold);
        }

        .navbar-cta {
            background: var(--gold);
            color: #0A0A0A;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .navbar-cta:hover {
            background: var(--gold-light);
            transform: translateY(-1px);
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
        }

        .menu-toggle span {
            width: 24px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: all 0.3s;
        }

        /* ===== HERO ===== */
        .hero {
            padding: 100px 0 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 10, 0.82);
            pointer-events: none;
        }

        .hero > .container {
            position: relative;
            z-index: 1;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(26, 26, 26, 0.85);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .hero-badge span {
            color: var(--gold);
            font-weight: 600;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -2px;
            margin-bottom: 24px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero h1 .gold {
            color: var(--gold);
        }

        .hero-sub {
            font-size: 1.15rem;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto 40px;
            line-height: 1.7;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--gold);
            color: #0A0A0A;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 700;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            color: var(--text-primary);
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            border: 1px solid var(--border);
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-secondary:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .hero-icons {
            font-size: 3.5rem;
            margin-bottom: 24px;
            letter-spacing: 8px;
        }

        /* ===== SERVICIOS ===== */
        .servicios {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .servicios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .servicio-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .servicio-card:hover {
            border-color: var(--gold);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        .servicio-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .servicio-icon {
            font-size: 1.8rem;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(212,160,23,0.1);
            border-radius: var(--radius-sm);
            flex-shrink: 0;
        }

        .servicio-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .servicio-detail {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .servicio-price {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--gold);
            white-space: nowrap;
        }

        /* ===== EQUIPO ===== */
        .equipo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .equipo-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 28px;
            text-align: center;
            transition: all 0.3s;
        }

        .equipo-card:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: var(--shadow-gold);
        }

        .equipo-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 900;
            color: #1a1a2e;
            letter-spacing: -1px;
            border: 3px solid var(--gold);
            box-shadow: 0 4px 20px rgba(212,160,23,0.2);
        }

        .equipo-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .equipo-role {
            color: var(--gold);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .equipo-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .equipo-exp {
            display: inline-block;
            margin-top: 14px;
            background: rgba(212,160,23,0.1);
            color: var(--gold);
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* ===== GALERÍA ===== */
        .galeria {
            background: var(--bg-secondary);
        }

        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .galeria-item {
            position: relative;
            aspect-ratio: 1 / 1;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
        }

        .galeria-item .galeria-bg {
            position: absolute;
            inset: 0;
            transition: transform 0.5s;
            background-size: cover;
            background-position: center;
        }

        .galeria-item:hover .galeria-bg {
            transform: scale(1.05);
        }

        .galeria-item .galeria-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 60%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 24px;
            transition: background 0.3s;
        }

        .galeria-item:hover .galeria-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 60%);
        }

        .galeria-style {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .galeria-tag {
            font-size: 0.75rem;
            color: var(--gold);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ===== CONTACTO / FORMULARIO ===== */
        .contacto {
            text-align: center;
        }

        .contacto-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 50px 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        .contacto-emoji {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
        }

        .contacto-box h3 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .contacto-box > p {
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: 1rem;
            line-height: 1.7;
        }

        .contacto-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            text-align: left;
            margin-bottom: 24px;
        }

        .contacto-form input,
        .contacto-form textarea,
        .contacto-form select {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .contacto-form input:focus,
        .contacto-form textarea:focus,
        .contacto-form select:focus {
            outline: none;
            border-color: var(--gold);
        }

        .contacto-form textarea {
            resize: vertical;
            min-height: 100px;
        }

        .contacto-form select option {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .contacto-form button[type="submit"] {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--gold);
            color: #0A0A0A;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 700;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            align-self: center;
        }

        .contacto-form button[type="submit"]:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #25D366;
            color: #fff;
            padding: 16px 36px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-whatsapp:hover {
            background: #20bd5a;
            transform: translateY(-2px);
            box-shadow: 0 4px 24px rgba(37,211,102,0.3);
        }

        .btn-whatsapp svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        .contacto-note {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .contacto-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .contacto-divider::before,
        .contacto-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ===== HORARIOS ===== */
        .horarios {
            background: var(--bg-secondary);
        }

        .horarios-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            max-width: 800px;
            margin: 0 auto;
        }

        .horarios-box, .ubicacion-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px;
        }

        .horarios-box h3, .ubicacion-box h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .horario-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .horario-row:last-child {
            border-bottom: none;
        }

        .horario-day {
            color: var(--text-secondary);
        }

        .horario-time {
            font-weight: 600;
        }

        .horario-closed {
            color: #e74c3c;
            font-weight: 600;
        }

        .ubicacion-address {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .ubicacion-map {
            width: 100%;
            height: 180px;
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid var(--border);
            position: relative;
        }

        .ubicacion-map::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 10, 0.55);
            border-radius: var(--radius-sm);
        }

        .ubicacion-map span {
            position: relative;
            z-index: 1;
        }

        /* ===== REVIEWS ===== */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .review-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            transition: all 0.3s;
        }

        .review-card:hover {
            border-color: var(--gold);
        }

        .review-stars {
            color: var(--gold);
            font-size: 0.9rem;
            margin-bottom: 14px;
            letter-spacing: 2px;
        }

        .review-text {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 16px;
            font-style: italic;
        }

        .review-author {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .review-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            flex-shrink: 0;
            color: #fff;
        }

        .review-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .review-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .review-source {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ===== FOOTER ===== */
        .footer {
            border-top: 1px solid var(--border);
            padding: 40px 0;
        }

        .footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-brand {
            font-size: 1.1rem;
            font-weight: 800;
        }

        .footer-brand span {
            color: var(--gold);
        }

        .footer-copy {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .footer-social {
            display: flex;
            gap: 12px;
        }

        .footer-social a {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .footer-social a:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212,160,23,0.1);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            section {
                padding: 60px 0;
            }

            .navbar-links {
                display: none;
            }

            .menu-toggle {
                display: flex;
            }

            .navbar-links.open {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 64px;
                left: 0;
                right: 0;
                background: rgba(10,10,10,0.97);
                backdrop-filter: blur(20px);
                padding: 20px;
                gap: 16px;
                border-bottom: 1px solid var(--border);
            }

            .hero {
                padding: 60px 0;
            }

            .hero h1 {
                letter-spacing: -1px;
            }

            .hero-icons {
                font-size: 2.5rem;
            }

            .servicios-grid {
                grid-template-columns: 1fr;
            }

            .equipo-grid {
                grid-template-columns: 1fr;
            }

            .equipo-avatar {
                width: 100px;
                height: 100px;
            }

            .servicios {
                background-attachment: scroll;
            }

            .galeria-grid {
                grid-template-columns: 1fr 1fr;
            }

            .horarios-grid {
                grid-template-columns: 1fr;
            }

            .reviews-grid {
                grid-template-columns: 1fr;
            }

            .contacto-box {
                padding: 36px 24px;
            }

            .footer-inner {
                flex-direction: column;
                text-align: center;
            }

            .demo-banner {
                font-size: 0.78rem;
                padding: 10px 16px;
            }
        }

        @media (max-width: 480px) {
            .galeria-grid {
                grid-template-columns: 1fr;
            }

            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .animate-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- ===== STRUCTURAL CONTAINERS — Populated by JavaScript from CONFIG ===== -->
    <div id="demo-banner"></div>
    <nav class="navbar" id="navbar"></nav>
    <section class="hero" id="hero-section"></section>
    <section class="servicios" id="servicios"></section>
    <section class="equipo" id="equipo"></section>
    <section class="galeria" id="galeria"></section>

    // --- Aplicar colores desde CONFIG a CSS variables ---
    function aplicarColores(colores) {
        const root = document.documentElement;
        const mapa = {
            gold: '--gold',
            goldLight: '--gold-light',
            goldDark: '--gold-dark',
            bgPrimary: '--bg-primary',
            bgSecondary: '--bg-secondary',
            bgCard: '--bg-card',
            bgCardHover: '--bg-card-hover',
            textPrimary: '--text-primary',
            textSecondary: '--text-secondary',
            textMuted: '--text-muted',
            border: '--border'
        };
        Object.entries(mapa).forEach(([key, cssVar]) => {
            if (colores[key]) {
                root.style.setProperty(cssVar, colores[key]);
            }
        });
        // Actualizar shadow-gold dinámicamente basado en el color gold
        const goldHex = colores.gold || '#D4A017';
        const r = parseInt(goldHex.slice(1,3), 16);
        const g = parseInt(goldHex.slice(3,5), 16);
        const b = parseInt(goldHex.slice(5,7), 16);
        root.style.setProperty('--shadow-gold', `0 4px 30px rgba(${r},${g},${b},0.15)`);
    }

    // --- Escapar HTML para prevenir XSS ---

        const div = document.createElement('div');
        div.textContent = str;

        }
    }

    // --- Inicializar interactividad (menú móvil + scroll animations) ---
    function inicializarInteractividad() {
        // Mobile menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');

        if (menuToggle && navLinks) {
            menuToggle.addEventListener('click', () => {
                navLinks.classList.toggle('open');
            });

            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    navLinks.classList.remove('open');
                });
            });
        }

        // Scroll animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, {
            threshold: 0.1,
            rootMargin: '0px 0px -40px 0px'
        });

        document.querySelectorAll('.animate-in').forEach(el => {
            observer.observe(el);
        });
    }

    // ============================================================
    //  INIT — Ejecutar todo el render
    // ============================================================
    (function init() {
        aplicarColores(CONFIG.colores);
        renderMeta();
        renderDemoBanner();
        renderNavbar();
        renderHero();
        renderServicios();
        renderEquipo();
        renderGaleria();
        renderContacto();
        renderHorarios();
        renderReviews();
        renderFooter();
        inicializarInteractividad();
    })();
    </script>

</body>
