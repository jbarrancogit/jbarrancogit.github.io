<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Cargando...</title>
    <meta name="description" id="page-description" content="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --wine: #8B1A4A;
            --wine-dark: #5E0F32;
            --wine-light: #A8325E;
            --wine-glow: #C2476F;
            --gold: #D4A853;
            --gold-light: #E8C97A;
            --gold-dark: #B08A3A;
            --cream: #FAF3E8;
            --bg-dark: #0D0A0C;
            --bg-card: #1A1318;
            --bg-card-hover: #231C20;
            --text-primary: #F5EDE4;
            --text-secondary: #B8A99A;
            --text-muted: #7A6E66;
            --border-subtle: rgba(139, 26, 74, 0.2);
            --border-wine: rgba(139, 26, 74, 0.4);
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.7;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== NAVIGATION ===== */
        .nav {
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(13, 10, 12, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 2rem;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .nav-logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-logo span {
            color: var(--wine-light);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--wine-light);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            padding: 4rem 2rem;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(13, 10, 12, 0.65);
            z-index: 0;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: linear-gradient(to top, var(--bg-dark), transparent);
            z-index: 1;
        }

        .hero-particles {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .hero-particles span {
            position: absolute;
            display: block;
            width: 3px;
            height: 3px;
            background: var(--wine-light);
            border-radius: 50%;
            opacity: 0;
            animation: particleFade 6s ease-in-out infinite;
        }

        .hero-particles span:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
        .hero-particles span:nth-child(2) { top: 60%; left: 85%; animation-delay: 1s; }
        .hero-particles span:nth-child(3) { top: 35%; left: 70%; animation-delay: 2s; }
        .hero-particles span:nth-child(4) { top: 75%; left: 25%; animation-delay: 3s; }
        .hero-particles span:nth-child(5) { top: 15%; left: 55%; animation-delay: 4s; }
        .hero-particles span:nth-child(6) { top: 80%; left: 60%; animation-delay: 1.5s; }
        .hero-particles span:nth-child(7) { top: 45%; left: 15%; animation-delay: 3.5s; }
        .hero-particles span:nth-child(8) { top: 50%; left: 90%; animation-delay: 0.5s; }

        @keyframes particleFade {
            0%, 100% { opacity: 0; transform: translateY(0) scale(1); }
            50% { opacity: 0.6; transform: translateY(-20px) scale(1.5); }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
        }

        .hero-emoji {
            font-size: 4rem;
            margin-bottom: 2rem;
            display: block;
            animation: floatEmoji 4s ease-in-out infinite;
        }

        @keyframes floatEmoji {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .hero-badge {
            display: inline-block;
            padding: 6px 20px;
            border: 1px solid var(--border-wine);
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--wine-light);
            margin-bottom: 2rem;
            background: rgba(139, 26, 74, 0.1);
        }

        .hero h1 {
            font-size: clamp(2.8rem, 7vw, 5.5rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--gold) 50%, var(--text-primary) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 4s ease-in-out infinite;
        }

        @keyframes textShine {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 200% center; }
        }

        .hero h1 .line-accent {
            display: block;
            font-style: italic;
            font-weight: 300;
            font-size: 0.45em;
            letter-spacing: 0.08em;
            -webkit-text-fill-color: var(--wine-light);
            margin-top: 0.3em;
        }

        .hero-tagline {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            color: var(--text-secondary);
            font-weight: 300;
            max-width: 550px;
            margin: 1.5rem auto 2.5rem;
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            border: none;
            letter-spacing: 0.02em;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--wine), var(--wine-light));
            color: #fff;
            box-shadow: 0 4px 20px rgba(139, 26, 74, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(139, 26, 74, 0.6);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-wine);
        }

        .btn-secondary:hover {
            background: rgba(139, 26, 74, 0.1);
            border-color: var(--wine-light);
            transform: translateY(-2px);
        }

        .hero-scroll {
            position: absolute;
            bottom: 3rem;
            z-index: 2;
            animation: scrollBounce 2s ease-in-out infinite;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
        }

        @keyframes scrollBounce {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(8px); opacity: 1; }
        }

        /* ===== SECTIONS ===== */
        .section {
            padding: 6rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-label {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--wine-light);
            margin-bottom: 1rem;
            padding: 5px 14px;
            border: 1px solid var(--border-wine);
            border-radius: 20px;
            background: rgba(139, 26, 74, 0.08);
        }

        .section-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            line-height: 1.15;
        }

        .section-subtitle {
            font-size: 1.05rem;
            color: var(--text-secondary);
            max-width: 600px;
            font-weight: 300;
            line-height: 1.7;
        }

        .section-header {
            margin-bottom: 3.5rem;
        }

        .section-divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(to right, var(--wine), var(--gold));
            margin: 1.5rem 0;
            border-radius: 2px;
        }

        .section-center .section-subtitle {
            margin-left: auto;
            margin-right: auto;
        }

        .section-center {
            text-align: center;
        }

        .section-center .section-divider {
            margin-left: auto;
            margin-right: auto;
        }

        /* ===== HISTORIA ===== */
        .historia-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .historia-visual {
            aspect-ratio: 4 / 5;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-subtle);
        }

        .historia-visual::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(13, 10, 12, 0.25);
            z-index: 1;
        }

        .historia-visual-inner {
            position: absolute;
            inset: 0;
            background: transparent;
        }

        .historia-visual-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            background: linear-gradient(to top, rgba(13, 10, 12, 0.95), transparent);
            z-index: 2;
        }

        .historia-visual-overlay p {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .historia-stat-row {
            display: flex;
            gap: 2rem;
            margin-top: 2.5rem;
        }

        .historia-stat {
            text-align: center;
        }

        .historia-stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--gold);
            line-height: 1;
        }

        .historia-stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.3rem;
        }

        .historia-text p {
            color: var(--text-secondary);
            margin-bottom: 1.2rem;
            font-size: 1rem;
            line-height: 1.8;
        }

        .historia-text p:first-of-type::first-letter {
            font-size: 3.5rem;
            font-weight: 800;
            float: left;
            line-height: 1;
            margin-right: 12px;
            margin-top: 4px;
            color: var(--wine-light);
        }

        .historia-quote {
            border-left: 3px solid var(--wine);
            padding: 1.2rem 1.5rem;
            margin: 2rem 0;
            background: rgba(139, 26, 74, 0.06);
            border-radius: 0 8px 8px 0;
        }

        .historia-quote p {
            font-style: italic;
            color: var(--text-primary) !important;
            font-size: 1.05rem !important;
        }

        .historia-quote cite {
            display: block;
            margin-top: 0.8rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-style: normal;
        }

        /* ===== VINOS ===== */
        .vinos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .vino-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 0;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        .vino-card-img {
            width: 100%;
            height: 160px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .vino-card-img::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(13, 10, 12, 0.1) 0%, rgba(13, 10, 12, 0.7) 100%);
        }

        .vino-card-body {
            padding: 1.5rem 1.5rem 2rem;
        }

        .vino-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--wine-light), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .vino-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-wine);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            background: var(--bg-card-hover);
        }

        .vino-card:hover::before {
            opacity: 1;
        }

        .vino-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .vino-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .vino-varietal {
            font-size: 0.75rem;
            color: var(--wine-light);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .vino-notes {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .vino-awards {
            font-size: 0.7rem;
            color: var(--gold);
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .vino-price {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .vino-price span {
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        /* ===== VISITAS ===== */
        .visitas-banner {
            width: 100%;
            height: 280px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 2.5rem;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .visitas-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(13, 10, 12, 0.2) 0%, rgba(13, 10, 12, 0.7) 100%);
        }

        .visitas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .visita-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .visita-card:hover {
            border-color: var(--border-wine);
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .visita-card.featured {
            border-color: var(--wine);
            position: relative;
        }

        .visita-card.featured::after {
            content: attr(data-featured-label);
            position: absolute;
            top: 16px;
            right: -30px;
            background: var(--wine);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            padding: 4px 40px;
            transform: rotate(45deg);
        }

        .visita-header {
            padding: 2rem 2rem 1rem;
        }

        .visita-emoji {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .visita-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .visita-duration {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .visita-body {
            padding: 0 2rem;
        }

        .visita-body ul {
            list-style: none;
            margin: 1rem 0;
        }

        .visita-body li {
            padding: 0.5rem 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .visita-body li::before {
            content: '\2713';
            color: var(--wine-light);
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .visita-footer {
            padding: 1.5rem 2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .visita-price {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .visita-price span {
            display: block;
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        .btn-whatsapp {
            background: #25D366;
            color: #fff;
            padding: 10px 22px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-whatsapp:hover {
            background: #1FB855;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        /* ===== GALERIA ===== */
        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: auto auto;
            gap: 1rem;
        }

        .galeria-item {
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 4 / 3;
            cursor: pointer;
        }

        .galeria-item:nth-child(1) {
            grid-column: 1 / 3;
            grid-row: 1 / 3;
            aspect-ratio: auto;
        }

        .galeria-bg {
            position: absolute;
            inset: 0;
            transition: transform 0.6s ease;
            background-size: cover;
            background-position: center;
        }

        .galeria-item:hover .galeria-bg {
            transform: scale(1.05);
        }

        .galeria-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(13, 10, 12, 0.9) 0%, rgba(13, 10, 12, 0.1) 60%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.5rem;
            opacity: 0.7;
            transition: opacity 0.4s ease;
        }

        .galeria-item:hover .galeria-overlay {
            opacity: 1;
        }

        .galeria-overlay-emoji {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .galeria-overlay h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        .galeria-overlay p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* ===== REVIEWS ===== */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .review-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.4s ease;
        }

        .review-card:hover {
            border-color: var(--border-wine);
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .review-stars {
            color: var(--gold);
            font-size: 1rem;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        .review-text {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .review-author {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .review-source {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        /* ===== UBICACION ===== */
        .ubicacion-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }

        .ubicacion-map {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            position: relative;
        }

        .ubicacion-map-placeholder {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #1A1318 0%, #2A1F24 50%, #1A1318 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .ubicacion-map-placeholder .map-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        .ubicacion-map-placeholder p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .ubicacion-map-placeholder p strong {
            color: var(--text-primary);
            display: block;

            var div = document.createElement('div');

            return div.innerHTML;
        }

        function waLink(numero, texto) {
            return 'https://wa.me/' + numero + '?text=' + encodeURIComponent(texto);
        }

        function hexToRgba(hex, alpha) {
            var r = parseInt(hex.slice(1, 3), 16);
            var g = parseInt(hex.slice(3, 5), 16);
            var b = parseInt(hex.slice(5, 7), 16);
            return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
        }

        // Split nombre into logo parts: first word = principal, rest = acento
        function logoPartes() {

            s.setProperty('--wine-light', c.wineLight);
            s.setProperty('--wine-glow', c.wineGlow);

            s.setProperty('--gold-light', c.goldLight);
            s.setProperty('--gold-dark', c.goldDark);

                    '</div>' +
                    '<div class="footer-bottom">' +
                        '<p>&copy; ' + year + ' Bodega ' + esc(CONFIG.nombre) + '. Todos los derechos reservados.</p>' +
                    '</div>' +
                    '<p class="footer-legal">Beber con moderaci\u00f3n. Prohibida su venta a menores de 18 a\u00f1os.</p>' +
                '</div>' +
            '</footer>';
        }

        // --- Render completo ---
        function renderAll() {
            applyColors();
            applyMeta();

            var html = renderNav() +
                       renderHero() +
                       renderHistoria() +
                       renderVinos() +
                       renderExperiencias() +
                       renderGaleria() +
                       renderReviews() +
                       renderUbicacion() +
                       renderContacto() +
                       renderCTA() +
                       renderFooter();

            document.getElementById('app').innerHTML = html;

            // Post-render: attach event listeners
            initNavToggle();
            initFadeIn();
            initSmoothScroll();
            initFormspree();
        }

        // --- Interactividad ---
        function initNavToggle() {
            var toggle = document.getElementById('navToggle');
            var links = document.getElementById('navLinks');
            if (toggle && links) {
                toggle.addEventListener('click', function() {
                    links.classList.toggle('active');
                });
                links.querySelectorAll('a').forEach(function(link) {
                    link.addEventListener('click', function() {
                        links.classList.remove('active');
                    });
                });
            }
        }

        function initFadeIn() {
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            });

            document.querySelectorAll('.fade-in').forEach(function(el) {
                observer.observe(el);
            });
        }

        function initSmoothScroll() {
            document.querySelectorAll('a[href^="#"]').forEach(function(anchor) {
                anchor.addEventListener('click', function(e) {
                    var href = this.getAttribute('href');
                    if (href === '#') return;
                    var target = document.querySelector(href);
                    if (target) {
                        e.preventDefault();
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            });
        }

        function initFormspree() {
            var form = document.getElementById('contactForm');
            if (!form) return;
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                var data = new FormData(form);
                fetch(form.action, {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                }).then(function(response) {
                    if (response.ok) {
                        form.reset();
                        form.style.display = 'none';
                        document.getElementById('formSuccess').classList.add('visible');
                    } else {
                        alert('Hubo un error al enviar el formulario. Por favor, intent\u00e1 de nuevo.');
                    }
                }).catch(function() {
                    alert('Error de conexi\u00f3n. Verific\u00e1 tu internet e intent\u00e1 de nuevo.');
                });
            });
        }

        // --- Iniciar ---
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', renderAll);
        } else {
            renderAll();
        }
    })();
    </script>
</body>
</html>
