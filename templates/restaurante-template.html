<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Cargando...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --amber: #F59E0B;
            --amber-light: #FBBF24;
            --amber-dark: #D97706;
            --amber-glow: rgba(245, 158, 11, 0.15);
            --bg-dark: #0F0D0A;
            --bg-card: #1A1714;
            --bg-card-hover: #231F1A;
            --bg-surface: #141210;
            --text-primary: #FAF5EB;
            --text-secondary: #A8A196;
            --text-muted: #6B6560;
            --border: rgba(245, 158, 11, 0.12);
            --border-strong: rgba(245, 158, 11, 0.25);
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px rgba(245, 158, 11, 0.08);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== DEMO BANNER ===== */
        .demo-banner {
            background: linear-gradient(135deg, #1a1510 0%, #2a1f10 100%);
            border-bottom: 1px solid var(--border-strong);
            padding: 10px 20px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .demo-banner a {
            color: var(--amber);
            text-decoration: none;
            font-weight: 600;
            margin-left: 6px;
            transition: color 0.2s;
        }

        .demo-banner a:hover {
            color: var(--amber-light);
            text-decoration: underline;
        }

        /* ===== NAVIGATION ===== */
        .navbar {
            background: rgba(15, 13, 10, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            position: sticky;
            top: 41px;
            z-index: 999;
        }

        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .navbar-logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--amber);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .navbar-logo span { color: var(--text-primary); }

        .navbar-links { display: flex; gap: 28px; list-style: none; }

        .navbar-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .navbar-links a:hover { color: var(--amber); }

        .navbar-cta {
            background: var(--amber);
            color: #000;
            padding: 8px 20px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
        }

        .navbar-cta:hover {
            background: var(--amber-light);
            transform: translateY(-1px);
        }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* ===== HERO ===== */
        .hero {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 24px;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(15, 13, 10, 0.72) 0%, rgba(15, 13, 10, 0.85) 60%, rgba(15, 13, 10, 0.95) 100%);
            pointer-events: none;
        }

        .hero-content { position: relative; z-index: 1; max-width: 800px; }

        .hero-emoji {
            font-size: 3.5rem;
            margin-bottom: 24px;
            display: block;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .hero-title {
            font-size: clamp(2.8rem, 6vw, 4.5rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -2px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--amber-light) 50%, var(--amber) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.35rem);
            font-weight: 300;
            color: var(--text-secondary);
            max-width: 560px;
            margin: 0 auto 40px;
            line-height: 1.7;
        }

        .hero-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

        .btn-primary {
            background: var(--amber);
            color: #000;
            padding: 14px 32px;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.3);
        }

        .btn-primary:hover {
            background: var(--amber-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(245, 158, 11, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            padding: 14px 32px;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid var(--border-strong);
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            border-color: var(--amber);
            color: var(--amber);
            background: var(--amber-glow);
        }

        .hero-badge {
            display: inline-block;
            margin-top: 48px;
            padding: 8px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .hero-badge span { color: var(--amber); font-weight: 600; }

        /* ===== SECTIONS ===== */
        section { padding: 100px 24px; }

        .section-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .section-label {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--amber);
            margin-bottom: 12px;
        }

        .section-title {
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 16px;
        }

        .section-desc {
            font-size: 1.05rem;
            color: var(--text-secondary);
            max-width: 600px;
            line-height: 1.7;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-header .section-desc { margin: 0 auto; }

        /* ===== NUESTRA PROPUESTA ===== */
        .propuesta { background: var(--bg-surface); }

        .propuesta-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-top: 48px;
        }

        .propuesta-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0;
            transition: all 0.3s;
            text-align: center;
            overflow: hidden;
        }

        .propuesta-card:hover {
            border-color: var(--border-strong);
            background: var(--bg-card-hover);
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
        }

        .propuesta-card-img {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .propuesta-card-img::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 40%, rgba(26, 23, 20, 0.9) 100%);
        }

        .propuesta-card-body {
            padding: 28px 28px 36px;
        }

        .propuesta-icon {
            font-size: 2.5rem;
            margin-bottom: 20px;
            display: block;
        }

        .propuesta-card h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .propuesta-card p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ===== MENU ===== */
        .menu-section { background: var(--bg-dark); }

        .menu-categories {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 48px;
        }

        .menu-tab {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
        }

        .menu-tab:hover, .menu-tab.active {
            background: var(--amber);
            color: #000;
            border-color: var(--amber);
        }

        .menu-category { display: none; }
        .menu-category.active { display: block; }

        .menu-category-header {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 32px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
        }

        .menu-category-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(15, 13, 10, 0.8) 0%, rgba(15, 13, 10, 0.5) 100%);
        }

        .menu-category-title {
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            color: var(--amber);
            letter-spacing: -0.5px;
            position: relative;
            z-index: 1;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .menu-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            transition: all 0.25s;
        }

        .menu-item:hover {
            border-color: var(--border-strong);
            background: var(--bg-card-hover);
        }

        .menu-item-info { flex: 1; }

        .menu-item-name {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .menu-item-desc {
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .menu-item-price {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--amber);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ===== RESERVAS ===== */
        .reservas {
            background: var(--bg-surface);
            position: relative;
        }

        .reservas-hero-img {
            width: 100%;
            height: 280px;
            background-size: cover;
            background-position: center;
            border-radius: var(--radius);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .reservas-hero-img::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(20, 18, 16, 0.3) 0%, rgba(20, 18, 16, 0.7) 100%);
        }

        .reservas-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
        }

        .reservas-info h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .reservas-info p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 24px;
            line-height: 1.7;
        }

        .reservas-whatsapp {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #25D366;
            color: #fff;
            padding: 14px 28px;
            border-radius: 999px;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.25);
        }

        .reservas-whatsapp:hover {
            background: #20bd5a;
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(37, 211, 102, 0.35);
        }

        .reservas-whatsapp svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .reservas-form {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px;
        }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--amber);
            box-shadow: 0 0 0 3px var(--amber-glow);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder { color: var(--text-muted); }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-submit {
            width: 100%;
            margin-top: 8px;
        }

        /* ===== HORARIOS Y UBICACION ===== */
        .ubicacion { background: var(--bg-dark); }

        .ubicacion-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
        }

        .horarios-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px;
        }

        .horarios-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--amber);
        }

        .horario-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        .horario-row:last-child { border-bottom: none; }

        .horario-dia { font-weight: 500; }

        .horario-hora { color: var(--text-secondary); }

        .horario-cerrado { color: #EF4444; font-weight: 600; }

        .map-placeholder {
            background-size: cover;
            background-position: center;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            height: 100%;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }

        .map-placeholder::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(15, 13, 10, 0.5) 0%, rgba(15, 13, 10, 0.8) 100%);
        }

        .map-pin {
            font-size: 3rem;
            position: relative;
            z-index: 1;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .map-address {
            position: relative;
            z-index: 1;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .map-address strong {
            display: block;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .map-link {
            position: relative;
            z-index: 1;
            color: var(--amber);
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid var(--amber);
            padding: 8px 20px;
            border-radius: 999px;
            transition: all 0.25s;
        }

        .map-link:hover {
            background: var(--amber);
            color: #000;
        }

        /* ===== REVIEWS ===== */
        .reviews { background: var(--bg-surface); }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .review-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            transition: all 0.3s;
        }

        .review-card:hover {
            border-color: var(--border-strong);
            transform: translateY(-2px);
        }

        .review-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .review-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--amber-dark), var(--amber-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: #000;
            flex-shrink: 0;
        }

        .review-author { font-weight: 600; font-size: 0.95rem; }

        .review-meta {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .review-stars {
            color: var(--amber);
            font-size: 0.85rem;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .review-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.65;
            font-style: italic;
        }

        .review-source {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* ===== FOOTER ===== */
        .footer {
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            padding: 64px 24px 32px;
        }

        .footer-inner {
            max-width: 1100px;
            margin: 0 auto;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 48px;
            margin-bottom: 48px;
        }

        .footer-brand h3 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--amber);
            margin-bottom: 12px;
        }

        .footer-brand p {
            color: var(--text-muted);
            font-size: 0.88rem;
            line-height: 1.6;
        }

        .footer-col h4 {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .footer-col ul { list-style: none; }

        .footer-col li { margin-bottom: 10px; }

        .footer-col a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.88rem;
            transition: color 0.2s;
        }

        .footer-col a:hover { color: var(--amber); }

        .footer-socials {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .footer-social-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.25s;
        }

        .footer-social-link:hover {
            border-color: var(--amber);
            color: var(--amber);
            background: var(--amber-glow);
        }

        .footer-bottom {
            border-top: 1px solid var(--border);
            padding-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .footer-dev a {
            color: var(--amber);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-dev a:hover { text-decoration: underline; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .propuesta-grid { grid-template-columns: 1fr; }
            .menu-grid { grid-template-columns: 1fr; }
            .reservas-wrapper { grid-template-columns: 1fr; }
            .ubicacion-grid { grid-template-columns: 1fr; }
            .reviews-grid { grid-template-columns: 1fr; }
            .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
        }

        @media (max-width: 640px) {
            section { padding: 64px 16px; }
            .navbar-links { display: none; }
            .mobile-toggle { display: block; }
            .navbar-cta { display: none; }
            .hero { min-height: 80vh; padding: 60px 16px; }
            .hero-emoji { font-size: 2.5rem; }
            .propuesta-card-img { height: 160px; }
            .menu-category-header { height: 140px; }
            .reservas-hero-img { height: 200px; }
            .form-row { grid-template-columns: 1fr; }
            .footer-grid { grid-template-columns: 1fr; gap: 28px; }
            .footer-bottom { flex-direction: column; gap: 12px; text-align: center; }
            .demo-banner { font-size: 0.78rem; padding: 8px 12px; }
        }

        /* ===== MOBILE NAV ===== */
        .mobile-nav {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 13, 10, 0.97);
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
        }

function esc(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function aplicarColores() {
    var c = CONFIG.colores;
    var root = document.documentElement.style;
    root.setProperty('--amber', c.primario);
    root.setProperty('--amber-light', c.primarioClaro);
    root.setProperty('--amber-dark', c.primarioOscuro);
    root.setProperty('--amber-glow', c.primarioGlow);
    root.setProperty('--bg-dark', c.fondoOscuro);
    root.setProperty('--bg-card', c.fondoTarjeta);
    root.setProperty('--bg-card-hover', c.fondoTarjetaHover);
    root.setProperty('--bg-surface', c.fondoSuperficie);
    root.setProperty('--text-primary', c.textoPrimario);
    root.setProperty('--text-secondary', c.textoSecundario);
    root.setProperty('--text-muted', c.textoMuted);
    root.setProperty('--border', c.borde);
    root.setProperty('--border-strong', c.bordeFuerte);
}

        }).join('');

        return '<div class="menu-category' + activeClass + '" id="cat-' + esc(cat.id) + '">' +
            '<div class="menu-category-header" style="background-image: url(\'' + esc(cat.imagen) + '\');">' +

            '</div>' +

        '</div>';
    }).join('');

    document.getElementById('menu').innerHTML =
        '<div class="section-container">' +
            '<div class="section-header">' +
                '<span class="section-label">Nuestra carta</span>' +
                '<h2 class="section-title">Menú</h2>' +

            catsHtml +
        '</div>';

    // Attach tab events
    document.querySelectorAll('.menu-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.menu-category').forEach(function(el) { el.classList.remove('active'); });
            document.querySelectorAll('.menu-tab').forEach(function(el) { el.classList.remove('active'); });
            document.getElementById('cat-' + tab.dataset.cat).classList.add('active');
            tab.classList.add('active');
        });
    });
}

            : '<span class="horario-hora">' + esc(fila.hora) + '</span>';
        return '<div class="horario-row">' +
            '<span class="horario-dia">' + esc(fila.dia) + '</span>' +
            horaHtml +

function renderReviews() {
    var rh = CONFIG.reviewsHeader;

    var cardsHtml = CONFIG.reviews.map(function(review) {
        var stars = '';
        for (var i = 0; i < 5; i++) {
            stars += i < review.estrellas ? '\u2605' : '\u2606';
        }
        return '<div class="review-card">' +
            '<div class="review-header">' +
                '<div class="review-avatar">' + esc(review.iniciales) + '</div>' +
                '<div>' +
                    '<div class="review-author">' + esc(review.autor) + '</div>' +
                    '<div class="review-meta">' + esc(review.meta) + '</div>' +
                '</div>' +
            '</div>' +
            '<div class="review-stars">' + stars + '</div>' +
            '<p class="review-text">\u201C' + esc(review.texto) + '\u201D</p>' +
            '<div class="review-source">' +
                '<span style="color: #4285F4; font-weight: 700;">G</span> Reseña de ' + esc(review.fuente) +

    document.getElementById('reviews').innerHTML =

}

function iniciarAnimaciones() {
    var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                entry.target.style.opacity = '1';
                entry.target.style.transform = 'translateY(0)';
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.propuesta-card, .menu-item, .review-card, .horarios-card, .map-placeholder, .reservas-form, .reservas-info').forEach(function(el) {
        el.style.opacity = '0';
        el.style.transform = 'translateY(24px)';
        el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
        observer.observe(el);
    });
}
