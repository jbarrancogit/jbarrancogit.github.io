<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="48" y2="48">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#3b82f6" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- JB Monogram Box -->
  <rect x="2" y="4" width="40" height="40" rx="10" fill="#111827" stroke="#1e293b" stroke-width="0.8"/>
  <rect x="10" y="7" width="24" height="1.2" rx="0.6" fill="url(#glow)" opacity="0.6"/>
  <text x="22" y="31" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="18" fill="url(#glow)" filter="url(#iconShadow)">JB</text>
  <rect x="12" y="35" width="20" height="1" rx="0.5" fill="url(#glow)" opacity="0.25"/>
  <!-- Name -->
  <text x="54" y="23" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="18" fill="#f4f4f5">Juan<tspan fill="#3b82f6">.</tspan>Barranco</text>
  <!-- Slogan -->
  <text x="54" y="38" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="9.5" fill="#64748b" letter-spacing="1.2">LO DIGITAL, BIEN HECHO.</text>
</svg>
