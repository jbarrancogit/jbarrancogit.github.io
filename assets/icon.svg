<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="glow" x1="8" y1="8" x2="40" y2="40">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#3b82f6" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Background with subtle border -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="46.5" height="46.5" rx="11.25" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  <!-- Accent line top -->
  <rect x="12" y="4" width="24" height="1.5" rx="0.75" fill="url(#glow)" opacity="0.7"/>
  <!-- JB Monogram -->
  <text x="24" y="30" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="900" font-size="20" fill="url(#glow)" filter="url(#shadow)">JB</text>
  <!-- Underline accent -->
  <rect x="14" y="34" width="20" height="1.2" rx="0.6" fill="url(#glow)" opacity="0.3"/>
  <!-- Corner dots -->
  <circle cx="8" cy="8" r="1.2" fill="#3b82f6" opacity="0.4"/>
  <circle cx="40" cy="40" r="1.2" fill="#3b82f6" opacity="0.4"/>
</svg>
